<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Создай свой шрифт</title>
<style>
  body {font-family: Arial, sans-serif; margin: 2rem;}
  #preview {border: 1px solid #ccc; padding: 1rem; margin-top: 1rem;}
  textarea {width: 100%; height: 150px;}
  input[type="file"] {margin-top: 0.5rem;}
  button {margin-top: 0.5rem;}
</style>
</head>
<body>
<h1>Создай свой шрифт</h1>
<p>Введите текст, который хотите увидеть в новом шрифте, и загрузите файл с шрифтом (woff/woff2/ttf).</p>

<textarea id="text" placeholder="Введите текст…"></textarea>
<br>
<input type="file" id="fontFile" accept=".woff,.woff2,.ttf">
<br>
<button id="apply">Показать</button>

<div id="preview"></div>

<script>
document.getElementById('apply').onclick = async () => {
  const file = document.getElementById('fontFile').files[0];
  if (!file) { alert('Загрузите файл шрифта'); return; }
  const text = document.getElementById('text').value || 'Пример текста';
  const reader = new FileReader();
  reader.onload = () => {
    const fontName = 'CustomFont';
    const format = file.name.endsWith('.ttf') ? 'truetype' :
                   file.name.endsWith('.woff2') ? 'woff2' : 'woff';
    const style = document.createElement('style');
    style.textContent = `
      @font-face {
        font-family: '${fontName}';
        src: url('${reader.result}') format('${format}');
      }
      #preview {
        font-family: '${fontName}', sans-serif;
        font-size: 2rem;
      }
    `;
    document.head.appendChild(style);
    document.getElementById('preview').textContent = text;
  };
  reader.readAsDataURL(file);
};
</script>
</body>
</html>
